{% extends "base.html" %}
{% block title %}Manage Rooms{% endblock %}
{% block content %}
<h2>Manage Rooms</h2>

<h4 class="mt-4">Add New Room</h4>
<form method="post" class="row g-3">
  <div class="col-md-3">
    <label class="form-label">Room Number</label>
    <input type="text" name="room_number" class="form-control" required>
  </div>
  <div class="col-md-3">
    <label class="form-label">Room Type</label>
    <input type="text" name="room_type" class="form-control" placeholder="Single / Double / Suite" required>
  </div>
  <div class="col-md-3">
    <label class="form-label">Price per Night</label>
    <input type="number" name="price_per_night" step="0.01" class="form-control" required>
  </div>
  <div class="col-md-3">
    <label class="form-label">Capacity</label>
    <input type="number" name="capacity" min="1" class="form-control" required>
  </div>
  <div class="col-12">
    <button type="submit" class="btn btn-primary mt-2">Add Room</button>
  </div>
</form>

<h4 class="mt-5">All Rooms</h4>
<table class="table table-bordered table-sm mt-2">
  <thead class="table-light">
  <tr>
    <th>#</th>
    <th>Type</th>
    <th>Price</th>
    <th>Capacity</th>
    <th>Status</th>
    <th>Actions</th>
  </tr>
  </thead>
  <tbody>
  {% for room in rooms %}
    <tr>
      <form method="post" action="{{ url_for('edit_room', room_id=room.id) }}">
        <td>{{ room.room_number }}</td>
        <td><input type="text" name="room_type" value="{{ room.room_type }}" class="form-control form-control-sm"></td>
        <td><input type="number" step="0.01" name="price_per_night" value="{{ room.price_per_night }}" class="form-control form-control-sm"></td>
        <td><input type="number" name="capacity" value="{{ room.capacity }}" class="form-control form-control-sm"></td>
        <td>
          <select name="status" class="form-select form-select-sm">
            <option value="Available" {% if room.status=='Available' %}selected{% endif %}>Available</option>
            <option value="Booked" {% if room.status=='Booked' %}selected{% endif %}>Booked</option>
            <option value="Maintenance" {% if room.status=='Maintenance' %}selected{% endif %}>Maintenance</option>
          </select>
        </td>
        <td class="d-flex gap-1">
          <button type="submit" class="btn btn-sm btn-success">Save</button>
      </form>
      <form method="post" action="{{ url_for('delete_room', room_id=room.id) }}" onsubmit="return confirm('Delete this room?');">
        <button type="submit" class="btn btn-sm btn-danger">Delete</button>
      </form>
        </td>
    </tr>
  {% endfor %}
  </tbody>
</table>
{% endblock %}
