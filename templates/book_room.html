{% extends "base.html" %}
{% block title %}Book Room{% endblock %}
{% block content %}
<h2>Book Room {{ room.room_number }} ({{ room.room_type }})</h2>

<p>Price per night: <strong>{{ room.price_per_night }}</strong> | Capacity: {{ room.capacity }}</p>

<form method="post" class="mt-3">
  <div class="mb-3">
    <label class="form-label">Check-in</label>
    <input type="date" name="check_in" value="{{ check_in }}" class="form-control" required>
  </div>
  <div class="mb-3">
    <label class="form-label">Check-out</label>
    <input type="date" name="check_out" value="{{ check_out }}" class="form-control" required>
  </div>
  <div class="mb-3">
    <label class="form-label">Number of Guests</label>
    <input type="number" name="guests" min="1" max="{{ room.capacity }}" class="form-control" required>
  </div>
  <button type="submit" class="btn btn-success">Confirm Booking</button>
</form>
{% endblock %}
